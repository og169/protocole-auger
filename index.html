<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocole Auger - Dossier Secret</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            text-align: center;
            padding: 0;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image:
                linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)),
                url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><text x="50%" y="20%" font-size="40" fill="red" text-anchor="middle" font-family="Arial" font-weight="bold">CLASSIFIED</text><text x="50%" y="30%" font-size="40" fill="red" text-anchor="middle" font-family="Arial" font-weight="bold">LEVEL 5</text><rect x="10%" y="40%" width="80%" height="2px" fill="red"/><rect x="10%" y="60%" width="80%" height="2px" fill="red"/><text x="50%" y="50%" font-size="60" fill="red" text-anchor="middle" font-family="Arial" font-weight="bold">AUGER</text><text x="50%" y="70%" font-size="20" fill="red" text-anchor="middle" font-family="Arial" font-weight="bold">EYES ONLY</text></svg>');
            background-size: cover;
        }
        #terminal {
            width: 80%;
            max-width: 600px;
            border: 1px solid #0f0;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 20px #0f0;
            position: relative;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #output {
            font-size: 1.2em;
            margin-bottom: 20px;
            min-height: 150px;
            white-space: pre-wrap;
            text-shadow: 0 0 5px #0f0;
        }
        button {
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }
        button:hover {
            background: #0f0;
            color: #000;
        }
        input {
            background: rgba(0, 0, 0, 0.7);
            color: #0f0;
            border: 1px solid #0f0;
            padding: 10px;
            font-family: 'Courier New', monospace;
            width: 80%;
            max-width: 300px;
            margin: 10px;
        }
        .typewriter {
            border-right: 0.15em solid #0f0;
            animation: blink-caret 0.75s step-end infinite;
        }
        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #0f0; }
        }
        #error {
            color: #f00;
            font-size: 4em;
            display: none;
            text-shadow: 0 0 10px #f00;
            animation: glitch 1s linear infinite;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }
        @keyframes glitch {
            0% { transform: translate(-50%, -50%) skew(0deg); }
            20% { transform: translate(-50%, -50%) skew(2deg); }
            40% { transform: translate(-50%, -50%) skew(-1deg); }
            60% { transform: translate(-50%, -50%) skew(1deg); }
            80% { transform: translate(-50%, -50%) skew(-2deg); }
            100% { transform: translate(-50%, -50%) skew(0deg); }
        }
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0.1) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 2px;
            z-index: 1;
            pointer-events: none;
        }
    </style>
    <audio id="typeSound" src="data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU..." preload="auto"></audio>
    <audio id="errorSound" src="data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU..." preload="auto"></audio>
</head>
<body>
    <div class="scanline"></div>
    <div id="terminal">
        <div id="output"></div>
        <button id="startButton" style="display: none;">Lancer l’identification</button>
        <input type="text" id="textInput" style="display: none;" placeholder="">
        <div id="error" style="display: none;">RDV sur Whatsapp Mein Crêpe</div>
    </div>

    <script>
        const typeSound = document.getElementById('typeSound');
        const errorSound = document.getElementById('errorSound');
        const output = document.getElementById('output');
        const startButton = document.getElementById('startButton');
        const textInput = document.getElementById('textInput');
        const error = document.getElementById('error');

        function typeWriter(text, callback) {
            output.innerHTML = '';
            let i = 0;
            const speed = 100;
            function type() {
                if (i < text.length) {
                    output.innerHTML += text.charAt(i);
                    typeSound.currentTime = 0;
                    typeSound.play();
                    i++;
                    setTimeout(type, speed);
                } else if (callback) {
                    setTimeout(callback, 500);
                }
            }
            type();
        }

        typeWriter(
            "INITIALISATION DU PROTOCOLE…\n\nAnalyse ADN en cours…\n\nVérification du sang…",
            () => {
                startButton.style.display = 'block';
            }
        );

        startButton.addEventListener('click', () => {
            startButton.style.display = 'none';
            typeWriter(
                "Veuillez entrer votre prénom :",
                () => {
                    textInput.style.display = 'block';
                    textInput.focus();
                    textInput.placeholder = "Prénom";
                    textInput.dataset.step = "prenom";
                }
            );
        });

        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                textInput.style.display = 'none';
                const step = textInput.dataset.step;
                const value = textInput.value;
                textInput.value = '';

                if (step === "prenom") {
                    typeWriter(
                        `Correspondance trouvée…\n\nADN compatible : 87%\n\nStatut : Cousine ou cousin potentiel\n\nBienvenue, ${value}.`,
                        () => {
                            setTimeout(() => {
                                const utterance = new SpeechSynthesisUtterance("Si tu entends ceci, c’est que tu fais partie du cercle…");
                                utterance.rate = 0.9;
                                utterance.pitch = 0.8;
                                speechSynthesis.speak(utterance);

                                typeWriter(
                                    "Si tu entends ceci, c’est que tu fais partie du cercle…",
                                    () => {
                                        setTimeout(() => {
                                            typeWriter(
                                                "Le Conseil des AUGER observe…\n\nProuve que tu es digne",
                                                () => {
                                                    setTimeout(() => {
                                                        typeWriter(
                                                            "Nous sommes liés sans être attachés. Nous partageons le même sang sans blessure. Qui sommes-nous ?",
                                                            () => {
                                                                textInput.style.display = 'block';
                                                                textInput.focus();
                                                                textInput.placeholder = "Ta réponse";
                                                                textInput.dataset.step = "reponse";
                                                            }
                                                        );
                                                    }, 1000);
                                                }
                                            );
                                        }, 2000);
                                    }
                                );
                            }, 5000);
                        }
                    );
                }
                else if (step === "reponse") {
                    if (value.toLowerCase().includes("famille")) {
                        typeWriter(
                            "La famille a besoin de toi. Une mission commence...\n\nTemps restant : calcul en cours...",
                            () => {
                                const countDownDate = new Date("Mar 29, 2026 12:00:00").getTime();
                                const x = setInterval(() => {
                                    const now = new Date().getTime();
                                    const distance = countDownDate - now;
                                    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                                    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                                    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                                    const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                                    output.innerHTML = "La famille a besoin de toi. Une mission commence...\n\nTemps restant : " + days + "j " + hours + "h " + minutes + "m " + seconds + "s";
                                    if (distance < 0) {
                                        clearInterval(x);
                                        output.innerHTML = "Mission terminée";
                                    }
                                }, 1000);

                                setTimeout(() => {
                                    error.style.display = 'block';
                                    errorSound.play();
                                    setTimeout(() => {
                                        document.body.innerHTML = '<div style="color: red; font-size: 3em; font-family: Courier New, monospace; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: glitch 1s linear infinite;">SYSTÈME PIRATÉ…</div>';
                                    }, 3000);
                                }, 10000);
                            }
                        );
                    } else {
                        errorSound.play();
                        alert("ERREUR : Réponse incorrecte. Accès refusé.");
                        textInput.style.display = 'block';
                        textInput.focus();
                    }
                }
            }
        });
    </script>
</body>
</html>
